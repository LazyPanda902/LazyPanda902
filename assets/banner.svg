      <stop stop-color="#020617"/>
      <stop offset="0.45" stop-color="#07111f"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="line" x1="120" y1="0" x2="1080" y2="320" gradientUnits="userSpaceOnUse">
